<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Hero image placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f6a4a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0b5a3f" stop-opacity="0.35"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="30%" cy="20%" r="70%">
      <stop offset="0" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#glow)"/>
  <rect width="1400" height="900" fill="url(#grid)" opacity="0.9"/>

  <g opacity="0.9">
    <path d="M250 640c180-140 300-220 470-250 180-32 320 8 430 95" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="8" stroke-linecap="round"/>
    <path d="M1120 485l40 0l0 40" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" fill="rgba(255,255,255,0.9)">
    <text x="80" y="120" font-size="32" font-weight="700">Replace this with your hero image</text>
    <text x="80" y="165" font-size="18" opacity="0.85">Path example: assets/images/hero-personal.jpg</text>
  </g>
</svg>

